spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

api:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-time: ${JWT_EXPIRATION:3600000}
      refresh-expiration-time: ${JWT_REFRESH_EXPIRATION:86400000}

server:
  use-forward-headers: true